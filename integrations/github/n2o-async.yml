name: N2O Async
on:
  repository_dispatch:
    types: [n2o-async]

concurrency:
  group: n2o-async-${{ github.repository }}

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install n2o
        run: |
          curl -sL https://github.com/lukes/n2o/releases/latest/download/n2o-linux-amd64 -o /usr/local/bin/n2o
          chmod +x /usr/local/bin/n2o

      - name: Run workflow
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ github.event.client_payload.prompt }}
          allowed_tools: "Bash(n2o *),Read,Write,Edit,Glob,Grep"
