# Code Health Audit Configuration
# All values are optional — built-in defaults apply for missing keys
# Adjust thresholds as the codebase matures

thresholds:
  file_length:
    ts: 300        # TypeScript files
    tsx: 250       # React components (prefer small, focused components)
    sql: 500       # SQL files (views/migrations can be long)
    md: 400        # Markdown/docs
    default: 300   # Everything else

  function_density:
    max_exports: 10      # Warn when a file exports more than this
    cohesion_ratio: 0.3  # Critical when exports are unrelated (0 = no cohesion, 1 = perfect)

  test_coverage:
    critical_min_lines: 100  # Source files >100 lines without tests = critical
    warn_min_lines: 50       # Source files >50 lines without tests = warn

include:
  - "src/**"
  - "packages/**"
  - "apps/**"
  - "platform/**"
  - "dashboard/**"

exclude:
  - "node_modules/**"
  - "dist/**"
  - ".next/**"
  - "*.test.*"
  - "*.spec.*"
  - "__tests__/**"
  - "*.d.ts"
  - "*.config.*"
  - "scripts/**"

task_creation:
  sprint: "tech-debt"
  type: "docs"
  horizon: "next"
  dedup_prefix: "[code-health"
